<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | Bean & Brew Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Bean & Brew Cafe</a>
                
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <ul id="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="enquiry.html">Enquiry</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ENQUIRY SECTION -->
    <section>
        <div class="container">
            <h2>Send Us an Enquiry</h2>
            <p style="text-align: center; max-width: 700px; margin: 0 auto 3rem;">
                Have questions or special requests? Fill out the form below and we'll get back to you within 24 hours.
            </p>

            <div class="card" style="max-width: 700px; margin: 0 auto;">
                <form>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>

                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="e.g. Catering, Events, Feedback" required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>

                    <button type="submit" class="btn">Submit Enquiry</button>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Bean & Brew Cafe | All Rights Reserved</p>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
